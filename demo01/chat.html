<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .dataDiv {
            width: 400px;
            /* height: 600px; */
            /* background-color: antiquewhite; */
            /* 水平居中 */
            margin: auto;
            border-style: solid;
            border-color: gainsboro;
            border-width: 1px;
            border-radius: 10px;
        }

        /* 头部 */
        .topDiv {
            width: 100%;
            height: 50px;
            line-height: 50px;
            /* background-color: orange; */
            border-top-right-radius: 10px;
            border-top-left-radius: 10px;
            font-weight: 600;
            padding-left: 15px;
            box-sizing: border-box;
        }

        .line {
            width: 100%;
            height: 1px;
            background-color: gainsboro;
        }

        /* 主体 */
        .bodyDiv {
            width: 100%;
            height: 450px;
            /* background-color: rgb(8, 43, 160); */
            /* 内容超出，自动增加滚动条 */
            overflow: auto;
        }

        /* 清除浮动：使得标签浮动效果依然存在，但是会占据文档流 */
        .leftDiv:after {
            /* 插入一个空标签 */
            content: '';
            /* 设置成块级元素 */
            display: block;
            /* 清除浮动 */
            clear: both;
        }

        /* left */
        .leftDiv {
            width: 100%;
            /* background-color: gainsboro; */
        }

        .left1 {
            width: 50px;
            background-color: blue;
            float: left;
            margin-top: 10px;
            margin-left: 15px;
            margin-right: 10px;
            font-size: 17px;
            text-align: center;
            line-height: 50px;
            border-radius: 50%;
        }

        .left2 {
            width: 60%;
            height: 80px;
            /* background-color: rgb(192, 49, 21); */
            float: left;
            margin-top: 10px;
        }

        .leftContent {
            background-color: rgb(169, 166, 166);
            font-size: 17px;
            padding: 15px;
            border-radius: 0 10px 10px 10px;
            /* border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            border-bottom-left-radius: 10px; */
            margin-top: 5px;
            /* 用多少，占多少 */
            display: inline-block;
            /* 英文、数字自动换行 */
            word-break: break-all;
        }
        
        .rightDiv:after {
            /* 插入一个空标签 */
            content: '';
            /* 设置成块级元素 */
            display: block;
            /* 清除浮动 */
            clear: both;
        }

        /* right */
        .rightDiv {
            width: 100%;
            height: 120px;
            /* background-color: gainsboro; */
        }

        .right1 {
            width: 50px;
            height: 50px;
            background-color: rgb(100, 100, 164);
            float: right;
            margin-top: 10px;
            margin-left: 15px;
            margin-right: 10px;
            font-size: 17px;
            text-align: center;
            line-height: 50px;
            border-radius: 50%;
        }

        .right2 {
            width: 60%;
            height: 80px;
            /* background-color: rgb(192, 49, 21); */
            float: right;
            margin-top: 10px;
            text-align: right;
        }

        .rightTime {
            text-align: right;
        }

        .rightContent {
            background-color: rgb(81, 107, 238);
            font-size: 17px;
            padding: 15px;
            border-radius: 10px 0 10px 10px;
            /* border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            border-bottom-left-radius: 10px; */
            margin-top: 5px;
            color: white;
            /* block inline */
            /* 你用多少，就占据多少 */
            display: inline-block;
            text-align: left;
            word-break: break-all;
        }

        /* 尾部 */
        .bottomDiv {
            width: 100%;
            height: 150px;
            background-color: rgb(22, 142, 13);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            position: relative;
        }

        .text {
            width: 100%;
            height: 100%;
            /* 取消自动增大 */
            border-width: 0;
            box-sizing: border-box;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            /* 去掉选中状态 */
            outline: none;
            padding: 15px;
            font-size: 17px;
        }

        .commit {
            width: 90px;
            height: 35px;
            background-color: rgb(81, 81, 241);
            font-size: 17px;
            color: white;
            border-radius: 10px;
            text-align: center;
            line-height: 35px;
            position: absolute;
            right: 30px;
            bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="dataDiv">
        <!-- 头部 -->
        <div class="topDiv">王者峡谷交流群</div>

        <div class="line"></div>

        <!-- 主体 -->
        <div class="bodyDiv">
            <!-- leftDiv -->
            <div class="leftDiv">
                <div class="left1">牛魔</div>
                <div class="left2">
                    <div>17:25</div>
                    <div class="leftContent">啊啊啊啊啊啊啊</div>
                </div>
            </div>

            <!-- rightDiv -->
            <div class="rightDiv">
                <div class="right1">鲁班</div>
                <div class="right2">
                    <div class="rightTime">17:26</div>
                    <div class="rightContent">嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘</div>
                </div>
            </div>

            <!-- rightDiv -->
            <div class="rightDiv">
                <div class="right1">鲁班</div>
                <div class="right2">
                    <div class="rightTime">17:26</div>
                    <div class="rightContent">嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘</div>
                </div>
            </div>

            <!-- rightDiv -->
            <div class="rightDiv">
                <div class="right1">鲁班</div>
                <div class="right2">
                    <div class="rightTime">17:26</div>
                    <div class="rightContent">嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘</div>
                </div>
            </div>

            <!-- rightDiv -->
            <div class="rightDiv">
                <div class="right1">鲁班</div>
                <div class="right2">
                    <div class="rightTime">17:26</div>
                    <div class="rightContent">嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘嘘</div>
                </div>
            </div>
        </div>

        <div class="line"></div>

        <!-- 尾部 -->
        <div class="bottomDiv">
            <!-- 多行文本输入框 -->
            <textarea class="text" placeholder="请输入"></textarea>
            <!-- 发送按钮 -->
            <button class="commit">发送</button>
        </div>
    </div>
</body>
</html>
